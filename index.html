<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reels Studio — контент-план тижня</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;500;600;700;800&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#EAE4D2;
    --bg-2:#F8F3E5;
    --panel:#F8F3E5;
    --panel-2:#EFE7CF;
    --border:#C2B593;
    --text:#211D16;
    --muted:#4E483A;
    --muted-2:#7A7360;
    --accent:#B5342A;
    --accent-soft:#B5342A16;
    --amber:#B8801E;
    --teal:#177A6E;
    --violet:#5B4BC4;
    --coral:#C2452E;
    --green:#3C7A3C;
    --blue:#1C6FA0;
    --pink:#B0446E;
    --danger:#B5342A;
    --radius:3px;
    --radius-btn:20px;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:
      radial-gradient(ellipse 900px 500px at 15% -10%, #E7D3B455, transparent),
      radial-gradient(ellipse 700px 500px at 100% 0%, #D8DED640, transparent),
      var(--bg);
    color:var(--text);
    font-family:'Inter',sans-serif;
    min-height:100vh;
    -webkit-font-smoothing:antialiased;
  }
  .wrap{max-width:1180px;margin:0 auto;padding:28px 20px 80px;}

  /* ---------- HERO / SLATE ---------- */
  .slate{
    position:relative;
    border:1px solid var(--border);
    background:var(--bg-2);
    border-radius:var(--radius);
    overflow:hidden;
    margin-bottom:22px;
    box-shadow:0 2px 10px rgba(33,29,22,0.06);
  }
  .slate-stripes{
    height:14px;
    background:repeating-linear-gradient(-45deg, #211D16 0 18px, #F1EEE4 18px 20px, #211D16 20px 38px, #B5342A 38px 40px);
    opacity:.9;
  }
  .slate-body{
    padding:26px 28px 22px;
    display:flex;
    justify-content:space-between;
    align-items:flex-end;
    gap:20px;
    flex-wrap:wrap;
  }
  .slate-title{
    font-family:'Bebas Neue',sans-serif;
    font-size:44px;
    letter-spacing:2px;
    line-height:.95;
    color:var(--text);
    margin:0 0 6px;
  }
  .slate-title span{color:var(--accent);}
  .slate-sub{
    color:var(--muted);
    font-size:14.5px;
    max-width:520px;
    line-height:1.5;
    margin:0;
  }
  .slate-meta{
    text-align:right;
    font-family:'IBM Plex Mono',monospace;
    font-size:12px;
    color:var(--muted-2);
    line-height:1.9;
  }
  .slate-meta b{color:var(--accent);font-weight:600;}

  /* ---------- CONTROLS ---------- */
  .controls{
    display:flex;
    align-items:center;
    gap:10px;
    flex-wrap:wrap;
    margin-bottom:22px;
  }
  .btn{
    font-family:'Inter',sans-serif;
    font-size:13.5px;
    font-weight:600;
    border-radius:var(--radius-btn);
    border:1px solid var(--border);
    background:var(--panel);
    color:var(--text);
    box-shadow:0 1px 2px rgba(33,29,22,0.05);
    padding:10px 16px;
    cursor:pointer;
    transition:all .15s ease;
    display:inline-flex;
    align-items:center;
    gap:8px;
    white-space:nowrap;
  }
  .btn:hover{border-color:var(--accent);color:var(--accent);}
  .btn:disabled{opacity:.45;cursor:default;pointer-events:none;}
  .btn.primary{background:var(--accent);color:#FBF6EC;border-color:var(--accent);}
  .btn.primary:hover{background:#992D24;color:#FBF6EC;}
  .btn.ghost{background:transparent;}
  .btn.small{padding:6px 11px;font-size:12px;}
  .spacer{flex:1;}
  .cache-info{
    font-family:'IBM Plex Mono',monospace;
    font-size:12px;
    color:var(--muted-2);
    display:flex;
    align-items:center;
    gap:10px;
  }

  /* ---------- ARCHIVE ---------- */
  .archive{
    border:1px solid var(--border);
    background:var(--bg-2);
    border-radius:var(--radius);
    margin-bottom:22px;
    overflow:hidden;
    box-shadow:0 2px 10px rgba(33,29,22,0.05);
  }
  .archive-head{
    padding:14px 18px;
    font-family:'IBM Plex Mono',monospace;
    font-size:12.5px;
    color:var(--muted);
    border-bottom:1px solid var(--border);
  }
  .archive-list{max-height:260px;overflow-y:auto;}
  .archive-row{
    padding:11px 18px;
    display:flex;
    justify-content:space-between;
    gap:14px;
    align-items:center;
    border-bottom:1px solid var(--border);
    cursor:pointer;
  }
  .archive-row:last-child{border-bottom:none;}
  .archive-row:hover{background:var(--panel-2);}
  .archive-week{font-family:'Bebas Neue',sans-serif;font-size:20px;letter-spacing:1px;color:var(--accent);min-width:90px;}
  .archive-themes{font-size:12.5px;color:var(--muted);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .archive-date{font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--muted-2);}
  .archive-empty{padding:18px;color:var(--muted-2);font-size:13px;}

  /* ---------- GRID ---------- */
  .grid{display:grid;grid-template-columns:1fr 1fr;gap:18px;}
  @media(max-width:760px){.grid{grid-template-columns:1fr;} .slate-body{align-items:flex-start;} .slate-meta{text-align:left;}}

  /* ---------- CARD ---------- */
  .card{
    position:relative;
    background:var(--panel);
    border:1px solid var(--border);
    border-radius:var(--radius);
    padding:20px 20px 20px 30px;
    overflow:hidden;
    box-shadow:0 2px 10px rgba(33,29,22,0.05);
  }
  .sprockets{
    position:absolute;left:0;top:0;bottom:0;width:14px;
    background-image:radial-gradient(circle, var(--bg) 3px, transparent 3.5px);
    background-size:14px 22px;
    background-position:center;
    border-right:1px solid var(--border);
  }
  .card-head{display:flex;justify-content:space-between;align-items:flex-start;gap:10px;margin-bottom:14px;}
  .scene-no{
    font-family:'Bebas Neue',sans-serif;
    font-size:15px;
    letter-spacing:2px;
    color:var(--muted-2);
  }
  .genre-row{display:flex;align-items:center;gap:8px;margin-top:4px;}
  .dot{width:9px;height:9px;border-radius:50%;flex-shrink:0;}
  select.genre-select, input.genre-custom{
    font-family:'Inter',sans-serif;
    font-size:13px;
    font-weight:600;
    background:var(--panel-2);
    color:var(--text);
    border:1px solid var(--border);
    border-radius:var(--radius);
    padding:6px 9px;
  }
  .card-actions{display:flex;gap:6px;flex-shrink:0;}
  .icon-btn{
    width:30px;height:30px;
    border-radius:var(--radius-btn);
    border:1px solid var(--border);
    background:var(--panel-2);
    color:var(--muted);
    cursor:pointer;
    font-size:14px;
    display:flex;align-items:center;justify-content:center;
  }
  .icon-btn:hover{color:var(--accent);border-color:var(--accent);}

  textarea.idea-input{
    width:100%;
    resize:vertical;
    min-height:44px;
    background:var(--panel-2);
    border:1px solid var(--border);
    border-radius:var(--radius);
    color:var(--text);
    font-family:'Inter',sans-serif;
    font-size:13px;
    padding:9px 11px;
    margin-bottom:10px;
  }
  textarea.idea-input::placeholder{color:var(--muted-2);}
  textarea.idea-input:focus, select.genre-select:focus, input.genre-custom:focus{outline:1px solid var(--accent);}

  .gen-btn-row{margin-top:4px;}
  .gen-btn{
    width:100%;
    padding:11px;
    border-radius:var(--radius-btn);
    border:1px dashed var(--border);
    background:transparent;
    color:var(--muted);
    font-family:'Inter',sans-serif;
    font-weight:600;
    font-size:13px;
    cursor:pointer;
  }
  .gen-btn:hover{border-color:var(--accent);color:var(--accent);}

  .placeholder{
    padding:26px 4px 10px;
    text-align:center;
    color:var(--muted-2);
    font-size:12.5px;
    line-height:1.6;
  }
  .placeholder .big{font-size:26px;display:block;margin-bottom:6px;}

  .skeleton{padding:10px 0;}
  .skel-line{height:11px;background:linear-gradient(90deg,var(--panel-2),var(--border),var(--panel-2));background-size:200% 100%;animation:shine 1.3s infinite;border-radius:2px;margin-bottom:9px;}
  @keyframes shine{0%{background-position:200% 0;}100%{background-position:-200% 0;}}

  .theme-title{font-family:'Bebas Neue',sans-serif;font-size:23px;letter-spacing:.5px;line-height:1.15;margin:0 0 8px;color:var(--text);}
  .hook-box{
    background:var(--accent-soft);
    border-left:2px solid var(--accent);
    padding:9px 12px;
    font-size:13px;
    line-height:1.5;
    margin-bottom:14px;
    color:#5C2018;
  }
  .hook-label{font-family:'IBM Plex Mono',monospace;font-size:10px;letter-spacing:1px;color:var(--accent);display:block;margin-bottom:3px;}

  .section-label{
    font-family:'IBM Plex Mono',monospace;
    font-size:10.5px;
    letter-spacing:1.5px;
    color:var(--muted-2);
    text-transform:uppercase;
    margin:14px 0 7px;
    display:flex;align-items:center;justify-content:space-between;
  }
  .timeline{border-left:1px solid var(--border);padding-left:0;margin-bottom:4px;}
  .beat{display:flex;gap:10px;padding:5px 0 5px 12px;position:relative;}
  .beat::before{content:'';position:absolute;left:-3.5px;top:11px;width:6px;height:6px;border-radius:50%;background:var(--accent);}
  .beat-time{font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--accent);min-width:78px;flex-shrink:0;padding-top:1px;}
  .beat-desc{font-size:12.5px;color:var(--muted);line-height:1.5;}

  .code-block{
    background:var(--panel-2);
    border:1px solid var(--border);
    border-radius:var(--radius);
    padding:11px 12px;
    font-family:'IBM Plex Mono',monospace;
    font-size:11.5px;
    line-height:1.55;
    color:#332E20;
    white-space:pre-wrap;
    word-break:break-word;
    max-height:170px;
    overflow-y:auto;
    position:relative;
  }
  .caption-block{
    background:var(--panel-2);
    border:1px solid var(--border);
    border-radius:var(--radius);
    padding:11px 12px;
    font-size:12.5px;
    line-height:1.55;
    color:var(--text);
  }
  .copy-btn{
    background:transparent;border:1px solid var(--border);color:var(--muted-2);
    font-family:'IBM Plex Mono',monospace;font-size:10px;letter-spacing:.5px;
    padding:3px 10px;border-radius:var(--radius-btn);cursor:pointer;
  }
  .copy-btn:hover{color:var(--accent);border-color:var(--accent);}

  .tags{display:flex;flex-wrap:wrap;gap:6px;margin-top:8px;}
  .tag{
    font-family:'IBM Plex Mono',monospace;
    font-size:11px;
    color:var(--muted);
    background:var(--panel-2);
    border:1px solid var(--border);
    border-radius:20px;
    padding:3px 10px;
  }

  .note{
    margin-top:12px;
    font-size:11.5px;
    line-height:1.5;
    color:#5C4321;
    border-left:2px solid var(--accent);
    padding:6px 10px;
    background:#B8801E14;
  }
  .error-box{
    color:var(--danger);
    font-size:12.5px;
    padding:10px 0;
    line-height:1.5;
  }

  footer{
    margin-top:36px;
    text-align:center;
    color:var(--muted-2);
    font-size:12px;
    font-family:'IBM Plex Mono',monospace;
    line-height:1.7;
  }
  ::-webkit-scrollbar{width:8px;height:8px;}
  ::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px;}
</style>
</head>
<body>
<div class="wrap" id="app"></div>

<script>
const GENRES = [
  {name:"WOW-ефект", color:"var(--amber)"},
  {name:"Кейс", color:"var(--teal)"},
  {name:"AI-реклама бренду", color:"var(--violet)"},
  {name:"Гумор/Мем", color:"var(--coral)"},
  {name:"Лайфхак", color:"var(--green)"},
  {name:"Тренд", color:"var(--blue)"},
  {name:"Персонаж", color:"var(--pink)"},
];
const DEFAULT_GENRES = ["WOW-ефект","Кейс","AI-реклама бренду","Гумор/Мем"];

function emptyTopic(genre){
  return {genre, isCustom:false, idea:"", loading:false, error:null, data:null};
}

let state = {
  weekNumber:1,
  topics:[emptyTopic(DEFAULT_GENRES[0]),emptyTopic(DEFAULT_GENRES[1]),emptyTopic(DEFAULT_GENRES[2]),emptyTopic(DEFAULT_GENRES[3])],
  history:[],
  archive:[],
  archiveOpen:false,
  genWeekBusy:false,
};

function genreColor(name){
  const g = GENRES.find(x=>x.name===name);
  return g ? g.color : "var(--muted)";
}

/* ---------------- STORAGE ---------------- */
async function safeGet(key){
  try{ const r = await window.storage.get(key,false); return r ? r.value : null; }
  catch(e){ return null; }
}
async function safeSet(key,value){
  try{ await window.storage.set(key, value, false); }
  catch(e){ console.error("storage set failed", key, e); }
}

async function loadPersisted(){
  const s = await safeGet('cp_state');
  if(s){
    try{
      const parsed = JSON.parse(s);
      if(parsed.topics && parsed.topics.length===4) state.topics = parsed.topics;
      if(parsed.weekNumber) state.weekNumber = parsed.weekNumber;
    }catch(e){}
  }
  const h = await safeGet('cp_history');
  if(h){ try{ state.history = JSON.parse(h); }catch(e){ state.history=[]; } }
  const a = await safeGet('cp_archive_index');
  if(a){ try{ state.archive = JSON.parse(a); }catch(e){ state.archive=[]; } }
}
async function saveState(){
  await safeSet('cp_state', JSON.stringify({topics:state.topics, weekNumber:state.weekNumber}));
}
async function saveHistory(){
  if(state.history.length>300) state.history = state.history.slice(-300);
  await safeSet('cp_history', JSON.stringify(state.history));
}
async function saveArchiveIndex(){
  await safeSet('cp_archive_index', JSON.stringify(state.archive));
}
async function saveWeekData(id, topics){
  await safeSet('cp_week_'+id, JSON.stringify(topics));
}
async function loadWeekData(id){
  const v = await safeGet('cp_week_'+id);
  if(!v) return null;
  try{ return JSON.parse(v); }catch(e){ return null; }
}

/* ---------------- GENERATION ---------------- */
function buildAvoidList(){
  return state.history.slice(-25).map(h=>`— [${h.genre}] ${h.theme}: ${h.hook}`).join('\n');
}

const SYSTEM_PROMPT = `Ти — креативний контент-стратег для Reels/TikTok відео, які створюються за допомогою AI-відеогенераторів (Runway, Kling, Pika, Sora, Veo). Тебе наймають щотижня, щоб придумувати НОВІ, нешаблонні ідеї відео для конкретного жанру.

Головна вимога: максимальна креативність і нестандартність. Уникай найочевидніших сюжетів жанру (напр. для WOW — не бери "кіт летить на кулі", якщо це вже було; для гумору — не бери найпопулярніший мем без твісту). Шукай несподівані метафори, поєднання непоєднуваного, емоційні гачки, які рідко зустрічаються в типових AI-роликах цієї тематики.

Відповідай ВИКЛЮЧНО одним JSON-об'єктом, без пояснень, без markdown-огорож (без \`\`\`), у точно такому форматі:
{
 "theme": "коротка назва теми, 5-9 слів, українською",
 "hook": "1-2 речення — гачок відео (що відбувається в перші 1-3 секунди, чому це чіпляє)",
 "beats": [{"time":"0:00–0:03","desc":"..."}, {"time":"...","desc":"..."} ... 3-5 пунктів, що покривають хронометраж 15-30 секунд],
 "ai_prompt": "розгорнутий кінематографічний текстовий промпт англійською для відеогенератора, 40-70 слів, готовий для копіювання. Якщо жанр більше про живі зйомки (напр. Кейс, Лайфхак) — тут коротка режисерська ремарка українською замість промпту",
 "caption": "підпис для соцмережі українською, розмовний тон, з хуком у першому реченні, 2-4 речення, можна з емодзі",
 "hashtags": "6-8 хештегів через пробіл, українською і англійською, без коми",
 "note": "коротке попередження українською ТІЛЬКИ якщо ідея зачіпає реальний бренд, публічну особу чи товарний знак (напр. 'Концепт/спек-реклама, не пов'язано з брендом офіційно'); інакше порожній рядок"
}`;

async function callClaude(genre, idea){
  const avoid = buildAvoidList();
  const userPrompt = `Жанр відео: ${genre}
${idea && idea.trim() ? 'Побажання/суть від користувача: ' + idea.trim() : 'Ідею придумай повністю сам(а), спираючись на жанр.'}

Уже використані ідеї цього акаунта — НЕ повторюй їх і не роби близьких варіацій:
${avoid || '(поки що порожньо, це перша ідея)'}

Придумай одну нову, свіжу, нестандартну ідею відео в межах жанру.`;

  const response = await fetch("https://api.anthropic.com/v1/messages", {
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body: JSON.stringify({
      model:"claude-sonnet-4-6",
      max_tokens:1000,
      system: SYSTEM_PROMPT,
      messages:[{role:"user", content:userPrompt}]
    })
  });
  const data = await response.json();
  const text = (data.content||[]).map(b=>b.text||"").join("\n");
  const clean = text.replace(/```json/g,"").replace(/```/g,"").trim();
  return JSON.parse(clean);
}

async function generateCard(idx){
  const topic = state.topics[idx];
  topic.loading = true;
  topic.error = null;
  render();
  try{
    const result = await callClaude(topic.genre, topic.idea);
    topic.data = result;
    topic.loading = false;
    state.history.push({genre:topic.genre, theme:result.theme, hook:result.hook});
    await saveHistory();
    await saveState();
  }catch(e){
    topic.loading = false;
    topic.error = "Не вдалось згенерувати ідею. Спробуй ще раз.";
    console.error(e);
  }
  render();
}

async function generateWeek(){
  state.genWeekBusy = true;
  render();
  for(let i=0;i<4;i++){
    await generateCard(i);
  }
  const archiveId = String(Date.now());
  const themes = state.topics.map(t=> t.data ? t.data.theme : t.genre);
  state.archive.unshift({id:archiveId, weekNumber:state.weekNumber, date:new Date().toLocaleDateString('uk-UA'), themes});
  await saveArchiveIndex();
  await saveWeekData(archiveId, state.topics);
  state.genWeekBusy = false;
  render();
}

async function nextWeek(){
  state.weekNumber += 1;
  state.topics = state.topics.map(t=> emptyTopic(t.genre));
  render();
  await generateWeek();
}

async function loadArchivedWeek(id){
  const data = await loadWeekData(id);
  if(!data) return;
  const meta = state.archive.find(a=>a.id===id);
  state.topics = data;
  if(meta) state.weekNumber = meta.weekNumber;
  state.archiveOpen = false;
  await saveState();
  render();
}

async function clearCache(){
  if(!confirm("Очистити всю історію ідей та архів тижнів? Це не можна скасувати.")) return;
  state.history = [];
  state.archive = [];
  await saveHistory();
  await saveArchiveIndex();
  render();
}

function resetCard(idx){
  const t = state.topics[idx];
  state.topics[idx] = emptyTopic(t.genre);
  saveState();
  render();
}

function copyText(str, btnEl){
  navigator.clipboard.writeText(str).then(()=>{
    const old = btnEl.textContent;
    btnEl.textContent = "СКОПІЙОВАНО";
    setTimeout(()=>{ btnEl.textContent = old; }, 1400);
  }).catch(()=>{});
}

/* ---------------- RENDER ---------------- */
function esc(s){
  if(s===undefined||s===null) return "";
  return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
}

function renderGenreSelect(idx, topic){
  if(topic.isCustom){
    return `<input class="genre-custom" data-field="customGenre" data-idx="${idx}" type="text" value="${esc(topic.genre)}" placeholder="Свій жанр…" />`;
  }
  const known = GENRES.some(g=>g.name===topic.genre);
  let opts = GENRES.map(g=>`<option value="${esc(g.name)}" ${g.name===topic.genre?'selected':''}>${esc(g.name)}</option>`).join('');
  if(!known && topic.genre) opts += `<option value="${esc(topic.genre)}" selected>${esc(topic.genre)}</option>`;
  opts += `<option value="__custom__">Інший жанр…</option>`;
  return `<select class="genre-select" data-field="genre" data-idx="${idx}">${opts}</select>`;
}

function renderCardBody(idx, topic){
  if(topic.loading){
    return `<div class="skeleton">
      <div class="skel-line" style="width:70%;height:20px;"></div>
      <div class="skel-line" style="width:100%;height:34px;margin-top:10px;"></div>
      <div class="skel-line" style="width:90%;"></div>
      <div class="skel-line" style="width:60%;"></div>
      <div class="skel-line" style="width:80%;"></div>
    </div>`;
  }
  if(topic.error){
    return `<div class="error-box">⚠ ${esc(topic.error)}</div>
      <button class="gen-btn" data-action="gen-card" data-idx="${idx}">↻ Спробувати ще раз</button>`;
  }
  if(!topic.data){
    return `
      <textarea class="idea-input" data-field="idea" data-idx="${idx}" placeholder="Необов'язково: підкинь ідею, суть чи деталь (напр. «кав'ярня», «кіт-детектив», «до/після ремонту»)">${esc(topic.idea)}</textarea>
      <div class="placeholder">
        <span class="big">🎬</span>
        Натисни «Згенерувати», щоб отримати нову ідею для цього жанру
      </div>
      <div class="gen-btn-row">
        <button class="gen-btn" data-action="gen-card" data-idx="${idx}">✨ Згенерувати ідею</button>
      </div>`;
  }
  const d = topic.data;
  const beats = (d.beats||[]).map(b=>`
    <div class="beat">
      <div class="beat-time">${esc(b.time)}</div>
      <div class="beat-desc">${esc(b.desc)}</div>
    </div>`).join('');
  const tags = (d.hashtags||'').split(/\s+/).filter(Boolean).map(t=>`<span class="tag">${esc(t)}</span>`).join('');
  return `
    <textarea class="idea-input" data-field="idea" data-idx="${idx}" placeholder="Ідея/суть для наступної генерації…">${esc(topic.idea)}</textarea>
    <h3 class="theme-title">${esc(d.theme)}</h3>
    <div class="hook-box"><span class="hook-label">ГАЧОК</span>${esc(d.hook)}</div>

    <div class="section-label">Розкадровка</div>
    <div class="timeline">${beats}</div>

    <div class="section-label">AI-промпт / режисерська нотатка
      <button class="copy-btn" data-action="copy-prompt" data-idx="${idx}">КОПІЮВАТИ</button>
    </div>
    <div class="code-block">${esc(d.ai_prompt)}</div>

    <div class="section-label">Підпис для соцмережі
      <button class="copy-btn" data-action="copy-caption" data-idx="${idx}">КОПІЮВАТИ</button>
    </div>
    <div class="caption-block">${esc(d.caption)}</div>
    <div class="tags">${tags}</div>

    ${d.note ? `<div class="note">⚠ ${esc(d.note)}</div>` : ''}

    <div class="gen-btn-row" style="margin-top:14px;">
      <button class="gen-btn" data-action="gen-card" data-idx="${idx}">↻ Перегенерувати</button>
    </div>`;
}

function renderCard(idx){
  const topic = state.topics[idx];
  return `
  <div class="card">
    <div class="sprockets"></div>
    <div class="card-head">
      <div>
        <div class="scene-no">СЦЕНА 0${idx+1}</div>
        <div class="genre-row">
          <span class="dot" style="background:${genreColor(topic.isCustom?'':topic.genre)}"></span>
          ${renderGenreSelect(idx, topic)}
        </div>
      </div>
      <div class="card-actions">
        <button class="icon-btn" data-action="reset-card" data-idx="${idx}" title="Скинути картку">↺</button>
      </div>
    </div>
    ${renderCardBody(idx, topic)}
  </div>`;
}

function renderArchive(){
  if(!state.archiveOpen) return '';
  const rows = state.archive.length
    ? state.archive.map(a=>`
      <div class="archive-row" data-action="load-week" data-id="${esc(a.id)}">
        <div class="archive-week">Т${a.weekNumber}</div>
        <div class="archive-themes">${esc(a.themes.join(' · '))}</div>
        <div class="archive-date">${esc(a.date)}</div>
      </div>`).join('')
    : `<div class="archive-empty">Поки що порожньо — згенеруй перший тиждень.</div>`;
  return `
  <div class="archive">
    <div class="archive-head">🗂 АРХІВ ТИЖНІВ — клікни, щоб відкрити</div>
    <div class="archive-list">${rows}</div>
  </div>`;
}

function render(){
  const app = document.getElementById('app');
  app.innerHTML = `
    <div class="slate">
      <div class="slate-stripes"></div>
      <div class="slate-body">
        <div>
          <h1 class="slate-title">REELS <span>STUDIO</span></h1>
          <p class="slate-sub">Контент-план на тиждень для AI-відео: 4 теми, 4 жанри, свіжі ідеї щоразу. Онлайн-редактор гачків, розкадровок і промптів для Runway / Kling / Sora.</p>
        </div>
        <div class="slate-meta">
          ТИЖДЕНЬ&nbsp;<b>№${state.weekNumber}</b><br/>
          ДУБЛЬ&nbsp;<b>№${state.history.length+1}</b><br/>
          У ПАМ'ЯТІ&nbsp;<b>${state.history.length}</b>&nbsp;ідей
        </div>
      </div>
    </div>

    <div class="controls">
      <button class="btn primary" data-action="gen-week" ${state.genWeekBusy?'disabled':''}>🎬 Згенерувати тиждень</button>
      <button class="btn" data-action="next-week" ${state.genWeekBusy?'disabled':''}>▶ Наступний тиждень</button>
      <button class="btn ghost" data-action="toggle-archive">🗂 Архів (${state.archive.length})</button>
      <div class="spacer"></div>
      <div class="cache-info">
        <span>кеш: ${state.history.length} ід.</span>
        <button class="btn small ghost" data-action="clear-cache">🗑 Очистити кеш</button>
      </div>
    </div>

    ${renderArchive()}

    <div class="grid">
      ${state.topics.map((_,i)=>renderCard(i)).join('')}
    </div>

    <footer>
      Ідеї не повторюються — кожна нова генерація враховує ${Math.min(state.history.length,25)} останніх записів з кешу.<br/>
      Дані зберігаються локально в цьому застосунку і нікуди більше не надсилаються.
    </footer>
  `;
}

/* ---------------- EVENTS ---------------- */
document.addEventListener('click', (e)=>{
  const el = e.target.closest('[data-action]');
  if(!el) return;
  const action = el.dataset.action;
  const idx = el.dataset.idx !== undefined ? parseInt(el.dataset.idx) : null;
  if(action==='gen-card') generateCard(idx);
  else if(action==='reset-card') resetCard(idx);
  else if(action==='gen-week') generateWeek();
  else if(action==='next-week') nextWeek();
  else if(action==='toggle-archive'){ state.archiveOpen = !state.archiveOpen; render(); }
  else if(action==='clear-cache') clearCache();
  else if(action==='load-week') loadArchivedWeek(el.dataset.id);
  else if(action==='copy-prompt'){
    const t = state.topics[idx];
    if(t && t.data) copyText(t.data.ai_prompt, el);
  }
  else if(action==='copy-caption'){
    const t = state.topics[idx];
    if(t && t.data) copyText(t.data.caption + "\n\n" + (t.data.hashtags||''), el);
  }
});

document.addEventListener('input', (e)=>{
  const field = e.target.dataset.field;
  if(!field) return;
  const idx = parseInt(e.target.dataset.idx);
  if(field==='idea'){
    state.topics[idx].idea = e.target.value;
    saveState();
  } else if(field==='customGenre'){
    state.topics[idx].genre = e.target.value;
    saveState();
  }
});

document.addEventListener('change', (e)=>{
  const field = e.target.dataset.field;
  if(!field) return;
  const idx = parseInt(e.target.dataset.idx);
  if(field==='genre'){
    const val = e.target.value;
    if(val==='__custom__'){
      state.topics[idx].isCustom = true;
      state.topics[idx].genre = '';
    } else {
      state.topics[idx].isCustom = false;
      state.topics[idx].genre = val;
    }
    saveState();
    render();
  }
});

/* ---------------- INIT ---------------- */
(async function init(){
  render();
  await loadPersisted();
  render();
})();
</script>
</body>
</html>
